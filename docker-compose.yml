version: "3.9"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      # Server type
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "LATEST"

      # Performance tuning for 8 cores / 32GB RAM
      MEMORY: "16G"
      JVM_XX_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=30
        -XX:G1MaxNewSizePercent=40
        -XX:G1HeapRegionSize=8M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:InitiatingHeapOccupancyPercent=15
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1

      # Server settings
      SERVER_NAME: "My Minecraft Server"
      MOTD: "Welcome to the server!"
      MAX_PLAYERS: 20
      VIEW_DISTANCE: 12
      SIMULATION_DISTANCE: 8
      DIFFICULTY: "normal"
      MODE: "survival"
      PVP: "true"
      ONLINE_MODE: "true"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: 0
      MAX_TICK_TIME: 60000

      # Whitelist (set to true and add players if you want to restrict access)
      ENABLE_WHITELIST: "false"

      # RCON for remote management
      ENABLE_RCON: "true"
      RCON_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"
      RCON_PORT: 25575

      # Timezone
      TZ: "UTC"

    volumes:
      - ./data:/data
    stdin_open: true
    tty: true

    # Health check
    healthcheck:
      test: mc-health
      start_period: 2m
      interval: 30s
      retries: 5

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 20G
        reservations:
          cpus: "4"
          memory: 16G
